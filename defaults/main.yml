---
# === Hardware (calculado dinamicamente pelo role hardware_profiling) ===
ollama_model_selected: "qwen2.5:14b-instruct-q4_K_M"
ollama_ram_limit: "26g"
ollama_gpu_enabled: false
ollama_num_parallel: 4
ollama_keep_alive: "30m"
headless: false

# === Demo / Low-spec mode ===
# skip_ollama: true  -> nao provisiona Ollama (usar quando RAM < 12GB)
# skip_anythingllm_api: true -> nao tenta configurar AnythingLLM via API (setup manual via browser)
skip_ollama: false
skip_anythingllm_api: false
demo_mode: false
min_ram_mb: 6144
min_disk_gb: 8

# === Pesquisadores ===
# Formato: [{"name": "Maria", "email": "maria@lab.edu.br"}, ...]
researchers: []

# === Workspace Registry (CNPq Art. 9o, I, c) ===
# Quando skip_ollama=true, workspaces com provider=ollama sao automaticamente omitidos
# pelo template gateway_workspace_registry_yml.j2 (nao precisa editar aqui).
workspace_registry:
  ws-analise-dados:
    finalidade: "analise e processamento de dados"
    fase_pesquisa: "analise de dados"
    provider: "ollama"
    path: "/local"
  ws-concepcao:
    finalidade: "concepcao e planejamento da pesquisa"
    fase_pesquisa: "concepcao"
    provider: "openai"
    model: "gpt-4"
    path: "/cloud"
  ws-redacao:
    finalidade: "redacao e revisao de texto"
    fase_pesquisa: "redacao"
    provider: "openai"
    model: "gpt-4"
    path: "/cloud"
  ws-revisao-literatura:
    finalidade: "revisao bibliografica e pesquisa de literatura"
    fase_pesquisa: "concepcao"
    provider: "openai"
    model: "gpt-4"
    path: "/cloud"
  ws-submissao:
    finalidade: "formatacao e preparacao para submissao"
    fase_pesquisa: "submissao"
    provider: "openai"
    model: "gpt-4"
    path: "/cloud"

# === Workspace API Keys ===
# Geradas automaticamente se nao fornecidas via vault.
# Para producao, defina via Ansible Vault (vault.yml):
#   workspace_api_keys:
#     ws-analise-dados: "sua-chave-segura"
#     ws-concepcao: "sua-chave-segura"
#     ...
workspace_api_keys:
  ws-analise-dados: "key-analise-001"
  ws-concepcao: "key-concepcao-001"
  ws-redacao: "key-redacao-001"
  ws-revisao-literatura: "key-revisao-001"
  ws-submissao: "key-submissao-001"

# === Presidio ===
presidio_language: "pt"
presidio_score_threshold: 0.5

# === Gateway ===
gateway_port: 8000
gateway_max_body_mb: 10
gateway_request_timeout: 120

# === Cloud LLM Provider ===
# OpenAI:    https://api.openai.com/v1
# z.ai:      https://api.z.ai/api/paas/v4
# BigModel:  https://open.bigmodel.cn/api/paas/v4
# Outros providers compativeis com a OpenAI API tambem funcionam.
openai_base_url: "https://api.openai.com/v1"
# Modelo cloud padrao usado pelos workspaces se nao especificado em workspace_registry
cloud_model_default: "gpt-4"

# === TLS ===
labai_domain: ""  # Vazio = auto-assinado

# === Rede ===
labai_subnet: "172.20.0.0/16"

# === Audit ===
audit_retention_days: 90
audit_log_path: "/var/log/gateway/audit.jsonl"

# === Backup ===
backup_dir: "/opt/labai/backups"
backup_ollama_model: false

# === Container Resources ===
# Defaults de producao. Em demo_mode, sobrescrever via --extra-vars:
#   presidio_memory_limit: "800m"
#   gateway_memory_limit: "384m"
#   anythingllm_memory_limit: "1500m"
presidio_memory_limit: "2g"
gateway_memory_limit: "1g"
anythingllm_memory_limit: "4g"

# === AnythingLLM ===
anythingllm_admin_password: ""  # Obrigatorio via vault em producao
