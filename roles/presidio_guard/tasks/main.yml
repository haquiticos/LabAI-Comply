---
- name: Ensure Presidio build directory exists
  ansible.builtin.file:
    path: /opt/labai/presidio
    state: directory
    mode: "0755"
  tags: [presidio]

- name: Create custom Presidio analyzer Dockerfile with spaCy Portuguese model
  ansible.builtin.copy:
    dest: /opt/labai/presidio/Dockerfile
    content: |
      FROM mcr.microsoft.com/presidio-analyzer:latest
      RUN pip install spacy && python -m spacy download pt_core_news_sm
    mode: "0644"
  register: _presidio_dockerfile
  tags: [presidio]

- name: Check if presidio-analyzer-pt image exists
  ansible.builtin.shell: docker image inspect presidio-analyzer-pt > /dev/null 2>&1 && echo "exists" || echo "missing"
  register: _presidio_image_check
  changed_when: false
  tags: [presidio]

- name: Build custom Presidio analyzer image
  ansible.builtin.shell: >
    docker build -t presidio-analyzer-pt /opt/labai/presidio/
  when: _presidio_image_check.stdout == "missing" or _presidio_dockerfile is changed
  register: _presidio_build
  tags: [presidio]

- name: Template Presidio analyzer engine configuration
  ansible.builtin.template:
    src: presidio_analyzer.yml.j2
    dest: /opt/labai/presidio/analyzer.yml
    mode: "0644"
  register: _presidio_analyzer_conf
  tags: [presidio]

- name: Template Presidio recognizer registry configuration
  ansible.builtin.template:
    src: presidio_recognizers.yml.j2
    dest: /opt/labai/presidio/recognizers.yml
    mode: "0644"
  register: _presidio_recognizers_conf
  tags: [presidio]

- name: Template Presidio NLP engine configuration
  ansible.builtin.template:
    src: presidio_nlp.yml.j2
    dest: /opt/labai/presidio/nlp.yml
    mode: "0644"
  register: _presidio_nlp_conf
  tags: [presidio]

- name: Check if Presidio Analyzer container is running
  ansible.builtin.shell: >
    docker ps --filter "name={{ presidio_analyzer_container }}"
    --format '{{ '{{' }}.Status{{ '}}' }}'
  register: _presidio_analyzer_status
  changed_when: false
  tags: [presidio]

- name: Recreate Presidio Analyzer container when any configuration changes
  ansible.builtin.shell: >
    docker rm -f {{ presidio_analyzer_container }}
  when:
    - _presidio_analyzer_status.stdout != ""
    - _presidio_analyzer_conf.changed or _presidio_recognizers_conf.changed or _presidio_nlp_conf.changed
  tags: [presidio]

- name: Deploy Presidio Analyzer container
  ansible.builtin.shell: >
    docker run -d
    --name {{ presidio_analyzer_container }}
    --network labai_net
    --restart unless-stopped
    --memory {{ presidio_memory_limit }}
    -v /opt/labai/presidio/analyzer.yml:/usr/share/presidio/analyzer.yml:ro
    -v /opt/labai/presidio/recognizers.yml:/usr/share/presidio/recognizers.yml:ro
    -v /opt/labai/presidio/nlp.yml:/usr/share/presidio/nlp.yml:ro
    --health-cmd "curl -f http://localhost:3000/health"
    --health-interval 30s
    --health-timeout 10s
    --health-retries 3
    -p 5002:3000
    -e ANALYZER_CONF_FILE=/usr/share/presidio/analyzer.yml
    -e RECOGNIZER_REGISTRY_CONF_FILE=/usr/share/presidio/recognizers.yml
    -e NLP_CONF_FILE=/usr/share/presidio/nlp.yml
    presidio-analyzer-pt
  when: >
    _presidio_analyzer_status.stdout == ""
    or _presidio_analyzer_conf.changed
    or _presidio_recognizers_conf.changed
    or _presidio_nlp_conf.changed
  tags: [presidio]

- name: Check if Presidio Anonymizer container is running
  ansible.builtin.shell: >
    docker ps --filter "name={{ presidio_anonymizer_container }}"
    --format '{{ '{{' }}.Status{{ '}}' }}'
  register: _presidio_anonymizer_status
  changed_when: false
  tags: [presidio]

- name: Deploy Presidio Anonymizer container
  ansible.builtin.shell: >
    docker run -d
    --name {{ presidio_anonymizer_container }}
    --network labai_net
    --restart unless-stopped
    --memory {{ presidio_memory_limit }}
    --health-cmd "curl -f http://localhost:5001/health"
    --health-interval 30s
    --health-timeout 10s
    --health-retries 3
    -p 5001:5001
    {{ presidio_anonymizer_image }}
  when: _presidio_anonymizer_status.stdout == ""
  tags: [presidio]

- name: Wait for Presidio Analyzer to be healthy
  ansible.builtin.uri:
    url: "http://localhost:5002/health"
    method: GET
  register: _analyzer_health
  until: _analyzer_health.status == 200
  retries: 15
  delay: 5
  tags: [presidio]

- name: Verify again custom recognizers loaded from mounted YAML
  ansible.builtin.uri:
    url: "http://localhost:5002/recognizers?language={{ presidio_language }}"
    method: GET
    return_content: true
  register: _loaded_recognizers
  retries: 5
  delay: 3
  failed_when: "'BR_CPF_Recognizer' not in (_loaded_recognizers.content | string)"
  tags: [presidio]

- name: Display loaded custom recognizers
  ansible.builtin.debug:
    msg: "Loaded recognizers: {{ (_loaded_recognizers.content | from_json).names | default([]) }}"
  tags: [presidio]

- name: Verify Presidio Analyzer connectivity
  ansible.builtin.shell: >
    curl -s -X POST http://localhost:5002/analyze
    -H "Content-Type: application/json"
    -d '{"text":"Meu CPF é 123.456.789-00","language":"pt"}'
  register: _presidio_verify
  changed_when: false
  tags: [presidio]

- name: Display Presidio verification result
  ansible.builtin.debug:
    msg: "Presidio Analyzer response: {{ _presidio_verify.stdout }}"
  tags: [presidio]
