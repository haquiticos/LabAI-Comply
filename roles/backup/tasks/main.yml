---
- name: Set backup defaults
  ansible.builtin.set_fact:
    backup_dir: "{{ backup_dir | default('/opt/labai/backups') }}"
    backup_ollama_model: "{{ backup_ollama_model | default(false) }}"
  tags: [backup]

- name: Create backup directories
  ansible.builtin.file:
    path: "{{ backup_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - daily
    - weekly
    - monthly
  tags: [backup]

- name: Ensure scripts directory exists
  ansible.builtin.file:
    path: /opt/labai/scripts
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [backup]

- name: Deploy daily backup script
  ansible.builtin.template:
    src: backup_script.sh.j2
    dest: /opt/labai/scripts/backup_daily.sh
    owner: root
    group: root
    mode: "0755"
  tags: [backup]

- name: Set up daily backup cron job
  ansible.builtin.cron:
    name: "labai daily backup"
    minute: "0"
    hour: "2"
    job: "/opt/labai/scripts/backup_daily.sh"
    user: root
    state: present
  tags: [backup]
